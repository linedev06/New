<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prometeus Advogados</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*,
*::before,
*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:"Montserrat",sans-serif;
  background:#fff;
  color:#1a1a1a;
}

/* VARIABLES */
:root{
  --or:#E8820C;
  --or2:#f59332;
  --pu:#5B2D8E;
  --gray:#F4F4F2;
  --mid:#DDDBD7;
}

/* NAV */
.navbar{
  height:64px;
  border-bottom:1px solid #eee;
  display:flex;
  align-items:center;
  justify-content:center;
}

.nav-logo{
  font-size:20px;
  letter-spacing:3px;
  color:var(--or);
}

/* HERO */
.hero{
  height:70vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0e0e28,#180e05);
  color:#fff;
  text-align:center;
}

.hero h1{
  font-size:32px;
}

/* BUTTON */
button{
  cursor:pointer;
  font-family:"Montserrat",sans-serif;
}

</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-logo">PROMETEUS</div>
</nav>

<section class="hero">
  <h1>Transformamos desafios jurídicos em oportunidades</h1>
</section>

</body>
</html>
